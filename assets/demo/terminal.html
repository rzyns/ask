<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASK CLI Demo</title>
    <style>
        body {
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
        }
        .window {
            width: 800px;
            height: 500px;
            background-color: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .title-bar {
            background-color: #2d2d2d;
            height: 30px;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        .buttons {
            display: flex;
            gap: 6px;
        }
        .button {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .close { background-color: #ff5f56; }
        .minimize { background-color: #ffbd2e; }
        .maximize { background-color: #27c93f; }
        .content {
            flex: 1;
            padding: 10px;
            color: #d4d4d4;
            overflow-y: hidden;
            font-size: 14px;
            line-height: 1.5;
        }
        .line {
            display: flex;
            margin-bottom: 2px;
            min-height: 21px; 
        }
        .prompt {
            color: #00add8;
            margin-right: 10px;
            white-space: nowrap;
        }
        .command {
            color: #d4d4d4;
        }
        .output {
            color: #a0a0a0;
            white-space: pre-wrap;
        }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background-color: #a0a0a0;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .success { color: #50fa7b; }
        .info { color: #8be9fd; }
        .warning { color: #f1fa8c; }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="buttons">
                <div class="button close"></div>
                <div class="button minimize"></div>
                <div class="button maximize"></div>
            </div>
        </div>
        <div class="content" id="terminal">
            <div class="line">
                <span class="prompt">$</span>
                <span class="command" id="current-command"></span><span class="cursor" id="cursor"></span>
            </div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const currentCommandSpan = document.getElementById('current-command');
        const cursor = document.getElementById('cursor');

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function typeCommand(text) {
            cursor.style.display = 'inline-block';
            for (let char of text) {
                currentCommandSpan.textContent += char;
                await delay(50 + Math.random() * 50);
            }
            await delay(300);
            cursor.style.display = 'none';
        }

        function addLine(html = '', type = 'output') {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'line';
            if (type === 'prompt') {
                lineDiv.innerHTML = `<span class="prompt">$</span><span class="command">${html}</span>`;
            } else {
                lineDiv.innerHTML = `<span class="output">${html}</span>`;
            }
            // Insert before the last existing line (which is the active input line)
            terminal.insertBefore(lineDiv, terminal.lastElementChild);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function runDemo() {
            await delay(1000);

            // Step 1: ask init
            await typeCommand('ask init');
            await delay(200);
            currentCommandSpan.textContent = ''; // clear current input line content visually, mimicking submit
            addLine('ask init', 'prompt');
            cursor.style.display = 'inline-block'; // show cursor again on new line (simulated)
            
            // Actually, my addLine implementation is inserting BEFORE the active line.
            // So to simulate "Enter", I should:
            // 1. Move the typed text to a new static line.
            // 2. Clear the typing area.
            // 3. Add output.
            // 4. Add new prompt.
            
            // Let's refactor slightly for better flow
            // Clear the "active" typing line text
            // Remove the active line temporarily
             terminal.removeChild(terminal.lastElementChild);
             
             // Add the command we just typed as a permanent line
             addLine('ask init', 'prompt');
             
             await delay(300);
             addLine('<span class="success">✓ Initialized ASK project</span>');
             addLine('  Created: ask.yaml');
             addLine('  Created: .agent/skills/');
             await delay(500);

             // Prepare new prompt
             const newLine = document.createElement('div');
             newLine.className = 'line';
             newLine.innerHTML = `<span class="prompt">$</span><span class="command" id="cmd2"></span><span class="cursor"></span>`;
             terminal.appendChild(newLine);
             
             const cmd2 = document.getElementById('cmd2');
             // Type next command: ask skill search browser
             await delay(500);
             let text = 'ask skill search browser';
             for (let char of text) {
                 cmd2.textContent += char;
                 await delay(50);
             }
             await delay(300);
             
             // Submit
             terminal.removeChild(terminal.lastElementChild);
             addLine('ask skill search browser', 'prompt');
             
             await delay(200);
             addLine('Searching for "browser"...');
             await delay(800); // Simulate network
             
             addLine('<span class="info">Found 5 skills:</span>');
             addLine('  - <span class="success">browser-use</span> (source: community) - Control local browser');
             addLine('  - web-surfer (source: anthropics) - Browse the web');
             addLine('  - browser-computer (source: scientific) - Browser agent');
             await delay(500);

             // Next command: ask skill install browser-use
             const newLine2 = document.createElement('div');
             newLine2.className = 'line';
             newLine2.innerHTML = `<span class="prompt">$</span><span class="command" id="cmd3"></span><span class="cursor"></span>`;
             terminal.appendChild(newLine2);
             
             const cmd3 = document.getElementById('cmd3');
             await delay(500);
             text = 'ask skill install browser-use';
             for (let char of text) {
                 cmd3.textContent += char;
                 await delay(50);
             }
             await delay(300);
             
             terminal.removeChild(terminal.lastElementChild);
             addLine('ask skill install browser-use', 'prompt');
             
             await delay(200);
             addLine('Installing browser-use...');
             addLine('Cloning https://github.com/browser-use/browser-use...');
             
             // Progress bar simulation
             const progressLine = document.createElement('div');
             progressLine.className = 'line';
             progressLine.innerHTML = `<span class="output">[=>                  ] 10%</span>`;
             terminal.appendChild(progressLine);
             
             for (let i = 20; i <= 100; i+=20) {
                 await delay(150);
                 let bars = '='.repeat(i/4);
                 let spaces = ' '.repeat(25 - i/4);
                 progressLine.innerHTML = `<span class="output">[${bars}${spaces}] ${i}%</span>`;
             }
             
             terminal.removeChild(progressLine); // Remove progress bar line
             addLine('<span class="success">✓ Installed skill: browser-use</span>');
             addLine('  Location: .agent/skills/browser-use');

             await delay(500);
             
             // Final Prompt
             const finalLine = document.createElement('div');
             finalLine.className = 'line';
             finalLine.innerHTML = `<span class="prompt">$</span><span class="cursor"></span>`;
             terminal.appendChild(finalLine);
        }

        runDemo();
    </script>
</body>
</html>
