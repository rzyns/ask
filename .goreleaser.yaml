version: 2
project_name: ask

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - 'README'
      - Merge pull request
      - Merge branch

brews:
  - name: ask
    repository:
      owner: yeasy
      name: homebrew-tap
    homepage: "https://github.com/yeasy/ask"
    description: "Agent Skills Kit - The Package Manager for Agent Skills"
    license: "MIT"
    install: |
      bin.install "ask"
    test: |
      system "#{bin}/ask", "--help"
