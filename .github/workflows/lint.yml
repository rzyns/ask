name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false
      
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.6.1
          args: --timeout=5m

  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Check formatting
        run: |
          go fmt ./...
          git diff --exit-code
      
      - name: Run go vet
        run: go vet ./...
